<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo à Florac - Lozère</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .location {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .weather-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .temperature {
            font-size: 72px;
            font-weight: bold;
            color: #333;
        }

        .weather-icon {
            font-size: 80px;
        }

        .weather-description {
            font-size: 18px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 20px;
            font-weight: bold;
        }

        .update-time {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Météo</h1>
        <div class="location">📍 Florac, Lozère (France)</div>

        <div id="loading" class="loading">Chargement des données météo...</div>
        <div id="error" style="display: none;"></div>
        <div id="weather" style="display: none;">
            <div class="weather-info">
                <div>
                    <div class="temperature" id="temp">--</div>
                    <div class="weather-description" id="description">--</div>
                </div>
                <div class="weather-icon" id="icon">🌤️</div>
            </div>

            <div class="weather-details">
                <div class="detail-box">
                    <div class="detail-label">Ressenti</div>
                    <div class="detail-value" id="feels-like">--°C</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Humidité</div>
                    <div class="detail-value" id="humidity">--%</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Vent</div>
                    <div class="detail-value" id="wind">-- km/h</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Pression</div>
                    <div class="detail-value" id="pressure">-- hPa</div>
                </div>
            </div>

            <div class="update-time">Dernière mise à jour: <span id="update-time">--</span></div>
        </div>
    </div>

    <script>
        const weatherElement = document.getElementById('weather');
        const loadingElement = document.getElementById('loading');
        const errorElement = document.getElementById('error');

        async function fetchWeather() {
            try {
                const latitude = 44.325;
                const longitude = 3.594;

                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,pressure_msl&timezone=Europe/Paris`
                );

                if (!response.ok) {
                    throw new Error('Erreur lors de la récupération des données');
                }

                const data = await response.json();
                const current = data.current;

                const weatherCode = current.weather_code;
                let icon = '🌤️';
                const description = getWeatherDescription(weatherCode);

                if (weatherCode === 0) icon = '☀️';
                else if (weatherCode === 1 || weatherCode === 2) icon = '⛅';
                else if (weatherCode === 3) icon = '☁️';
                else if (weatherCode === 45 || weatherCode === 48) icon = '🌫️';
                else if (weatherCode === 51 || weatherCode === 53 || weatherCode === 55) icon = '🌦️';
                else if (weatherCode === 61 || weatherCode === 63 || weatherCode === 65) icon = '🌧️';
                else if (weatherCode === 71 || weatherCode === 73 || weatherCode === 75) icon = '❄️';
                else if (weatherCode === 80 || weatherCode === 81 || weatherCode === 82) icon = '🌧️';
                else if (weatherCode === 85 || weatherCode === 86) icon = '❄️';
                else if (weatherCode === 95 || weatherCode === 96 || weatherCode === 99) icon = '⛈️';

                document.getElementById('temp').textContent = Math.round(current.temperature_2m) + '°C';
                document.getElementById('feels-like').textContent = Math.round(current.apparent_temperature) + '°C';
                document.getElementById('humidity').textContent = current.relative_humidity_2m + '%';
                document.getElementById('wind').textContent = Math.round(current.wind_speed_10m) + ' km/h';
                document.getElementById('pressure').textContent = Math.round(current.pressure_msl) + ' hPa';
                document.getElementById('icon').textContent = icon;
                document.getElementById('description').textContent = description;
                document.getElementById('update-time').textContent = new Date().toLocaleTimeString('fr-FR');

                loadingElement.style.display = 'none';
                weatherElement.style.display = 'block';

            } catch (error) {
                loadingElement.style.display = 'none';
                errorElement.style.display = 'block';
                errorElement.className = 'error';
                errorElement.textContent = '❌ Erreur: ' + error.message;
            }
        }

        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Dégagé',
                1: 'Peu nuageux',
                2: 'Partiellement nuageux',
                3: 'Nuageux',
                45: 'Brouillard',
                48: 'Brouillard givrant',
                51: 'Légère pluie',
                53: 'Pluie modérée',
                55: 'Pluie intense',
                61: 'Légère pluie',
                63: 'Pluie modérée',
                65: 'Pluie intense',
                71: 'Légère neige',
                73: 'Neige modérée',
                75: 'Neige intense',
                80: 'Averses légères',
                81: 'Averses modérées',
                82: 'Averses violentes',
                85: 'Averses de neige légères',
                86: 'Averses de neige denses',
                95: 'Orage',
                96: 'Orage avec grêle légère',
                99: 'Orage avec grêle'
            };
            return descriptions[code] || 'Conditions météo';
        }

        fetchWeather();
        setInterval(fetchWeather, 600000);
    </script>
</body>
</html>
